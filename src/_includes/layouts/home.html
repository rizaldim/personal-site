{% extends "layouts/base.html" %}

{% block content %}

	{{ content | safe }}

	{% if collections.posts %}

		<h2>Blog posts</h2>
		<ul>

			{% for post in collections.posts %}
			<li><a href="{{ post.url }}">{{ post.data.title }}</a></li>
			{% endfor %}

		</ul>

	{% else %}

		<p>There are no posts</p>

	{% endif %}

{% endblock %}
