{% extends "layouts/base.html" %}

{% block content %}

	{{ content | safe }}

	<section class="posts-section">
	{% if collections.posts %}

		<h2>Blog posts</h2>
		<ul>

			{% for post in collections.posts %}
			<li>
				<a href="{{ post.url }}">{{ post.data.title }}</a><br>
				<date>{{ post.data.date | dateFilter }}</date>
			</li>
			{% endfor %}

		</ul>

	{% endif %}
	</section>

{% endblock %}
