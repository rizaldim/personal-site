{% extends "layouts/base.html" %}

{% block content %}

	{{ content | safe }}

	<section>
	{% if collections.posts %}

		<h2>Blog posts</h2>
		<ul>

			{% for post in collections.posts %}
			<li>[{{ post.data.date | dateFilter }}] &#10140; <a href="{{ post.url }}">{{ post.data.title }}</a></li>
			{% endfor %}

		</ul>

	{% endif %}
	</section>

{% endblock %}
